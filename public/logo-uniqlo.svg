<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 56" fill="none">
  <!-- Left square: ユニクロ in katakana -->
  <rect x="0" y="0" width="56" height="56" fill="#E60012"/>
  <!-- ユ -->
  <text x="28" y="16" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">ユニ</text>
  <text x="28" y="40" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">クロ</text>
  <!-- Right square: UNIQLO -->
  <rect x="64" y="0" width="56" height="56" fill="#E60012"/>
  <text x="92" y="16" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">UNI</text>
  <text x="92" y="40" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" text-anchor="middle" dominant-baseline="middle">QLO</text>
</svg>
